<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200" fill="none" role="img" aria-label="ai guest list — a door swung open onto a disco, with a spinning disco ball and twinkling lights">
  <defs>
    <radialGradient id="room" cx="50%" cy="34%" r="75%">
      <stop offset="0%" stop-color="#fff3d6"/>
      <stop offset="60%" stop-color="#f6cd7a"/>
      <stop offset="100%" stop-color="#eab14f"/>
    </radialGradient>
    <linearGradient id="frame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#efe7d8"/>
      <stop offset="100%" stop-color="#ddd0b8"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f3ecdd"/>
      <stop offset="100%" stop-color="#d8c9ad"/>
    </linearGradient>
    <radialGradient id="ball" cx="38%" cy="32%" r="75%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="42%" stop-color="#bfe9df"/>
      <stop offset="100%" stop-color="#3f9f8c"/>
    </radialGradient>
    <radialGradient id="floor" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f6cd7a" stop-opacity=".55"/>
      <stop offset="100%" stop-color="#f6cd7a" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="ballClip"><circle cx="160" cy="92" r="20"/></clipPath>
  </defs>

  <!-- warm light spilling onto the floor -->
  <ellipse cx="172" cy="183" rx="96" ry="13" fill="url(#floor)"/>

  <!-- door frame -->
  <rect x="96" y="20" width="128" height="164" rx="22" fill="url(#frame)"/>
  <!-- the lit room inside -->
  <rect x="108" y="32" width="104" height="152" rx="15" fill="url(#room)"/>

  <!-- disco ball: string, body, facets, spinning highlight, glow -->
  <line x1="160" y1="32" x2="160" y2="72" stroke="#b59a5e" stroke-width="1.4"/>
  <circle cx="160" cy="92" r="23" fill="#f6cd7a" opacity=".35">
    <animate attributeName="r" values="22;25;22" dur="1.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values=".25;.5;.25" dur="1.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="160" cy="92" r="20" fill="url(#ball)"/>
  <g clip-path="url(#ballClip)" stroke="#2f8a78" stroke-width="1" opacity=".55">
    <g>
      <line x1="146" y1="92" x2="174" y2="92"/>
      <path d="M140 80 q20 12 40 0" fill="none"/>
      <path d="M140 104 q20 -12 40 0" fill="none"/>
      <line x1="152" y1="72" x2="152" y2="112"/>
      <line x1="160" y1="72" x2="160" y2="112"/>
      <line x1="168" y1="72" x2="168" y2="112"/>
      <animateTransform attributeName="transform" type="translate" values="0 0;-10 0;0 0" dur="2.4s" repeatCount="indefinite"/>
    </g>
  </g>
  <ellipse cx="153" cy="85" rx="5" ry="3.4" fill="#ffffff" opacity=".9"/>

  <!-- twinkles in the room (teal / coral / gold / purple) -->
  <circle cx="124" cy="60" r="2.4" fill="#46c2a8"><animate attributeName="opacity" values=".15;1;.15" dur="1.1s" repeatCount="indefinite"/></circle>
  <circle cx="198" cy="58" r="2" fill="#e0795a"><animate attributeName="opacity" values="1;.15;1" dur="1.4s" repeatCount="indefinite"/></circle>
  <circle cx="196" cy="120" r="2.6" fill="#f3c969"><animate attributeName="opacity" values=".2;1;.2" dur="1s" begin="-.4s" repeatCount="indefinite"/></circle>
  <circle cx="122" cy="124" r="2.2" fill="#7c6cf0"><animate attributeName="opacity" values=".2;1;.2" dur="1.2s" begin="-.7s" repeatCount="indefinite"/></circle>
  <circle cx="132" cy="150" r="1.8" fill="#e0795a"><animate attributeName="opacity" values=".2;1;.2" dur="1.3s" begin="-.2s" repeatCount="indefinite"/></circle>
  <circle cx="190" cy="150" r="1.8" fill="#46c2a8"><animate attributeName="opacity" values="1;.2;1" dur="1.1s" begin="-.5s" repeatCount="indefinite"/></circle>

  <!-- door swung ajar on the left hinge -->
  <g>
    <rect x="58" y="36" width="22" height="142" rx="6" fill="url(#leaf)" transform="skewY(8)"/>
    <circle cx="74" cy="118" r="2.4" fill="#cf9b2e" transform="skewY(8)"/>
    <animateTransform attributeName="transform" type="rotate" values="-6 96 110;-3 96 110;-6 96 110" dur="4s" repeatCount="indefinite"/>
  </g>
</svg>
