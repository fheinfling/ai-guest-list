name: release

# Cut a release by pushing a tag: `git tag vX.Y.Z && git push origin vX.Y.Z`.
# This builds the unsigned .app on a macOS runner and attaches it to a GitHub Release.
# The tag's X.Y.Z MUST match acctsw/__init__.py __version__ (the job verifies and fails otherwise).

on:
  push:
    tags: ["v*"]

permissions:
  contents: write        # create the GitHub Release + upload the asset

jobs:
  build-and-release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0        # full history → git rev-list --count gives the build number

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify tag matches __version__
        run: |
          set -euo pipefail
          CODE_VER="$(python -c 'import acctsw; print(acctsw.__version__)')"
          TAG_VER="${GITHUB_REF_NAME#v}"
          echo "tag=$TAG_VER  code=$CODE_VER"
          if [ "$TAG_VER" != "$CODE_VER" ]; then
            echo "::error::tag v$TAG_VER does not match acctsw.__version__ ($CODE_VER). Bump __init__.py first."
            exit 1
          fi

      - name: Install deps
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          pip install -e ".[app,build,dev]"

      - name: Test (gate)
        run: |
          . .venv/bin/activate
          python -m pytest -q
          node --test app/web/*.test.mjs

      - name: Build web bundle + .app
        run: |
          . .venv/bin/activate
          python scripts/build-web.py
          python setup.py py2app

      - name: Zip the .app
        run: |
          ditto -c -k --keepParent "dist/AI Guest List.app" "AI-Guest-List-${GITHUB_REF_NAME}.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: AI-Guest-List-${{ github.ref_name }}.zip
          body: |
            Unsigned build — macOS will warn on first open. To run it:
            **right-click the app → Open → Open**, or
            `xattr -dr com.apple.quarantine "/Applications/AI Guest List.app"`.
