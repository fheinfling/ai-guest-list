name: ci

# Test pipeline: runs the Python suite + web-UI render tests on every push to main and every PR.
# Free for public repos. macOS runner matches the target platform (the engine shells out to macOS
# `security`/`ps`/`lsof` and the app uses pyobjc).

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read        # least-privilege GITHUB_TOKEN (tests need only checkout)

jobs:
  test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          pip install -e ".[app,dev]"

      - name: Run tests
        run: |
          . .venv/bin/activate
          python -m pytest -q --cov=acctsw --cov-report=xml
          node --test app/web/*.test.mjs

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}   # add this secret once at codecov.io
          files: coverage.xml
          fail_ci_if_error: false                # don't break CI if the token isn't set yet
